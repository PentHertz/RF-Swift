# Lima template for RF Swift - macOS USB passthrough
#
# RF Swift auto-manages this VM transparently. You can also use it manually:
#   limactl create --name rfswift lima/rfswift.yaml
#   limactl start rfswift
#
# USB device management (transparent from rfswift CLI):
#   rfswift macusb list              # List USB devices on macOS host
#   rfswift macusb attach --vid 0x1234 --pid 0x5678  # Attach USB to VM
#   rfswift macusb detach --vid 0x1234 --pid 0x5678  # Detach USB from VM
#   rfswift macusb vm-devices        # List attached USB devices
#   rfswift macusb status            # Check setup status
#
# IMPORTANT: vmType must be "qemu" for USB passthrough (not "vz")
# Prerequisites: brew install lima qemu

# Use QEMU backend - required for USB passthrough via QMP
vmType: qemu

# VM resources - adjust as needed for your SDR workloads
cpus: 4
memory: "8GiB"
disk: "100GiB"

# Use Ubuntu as the guest OS (matches RF Swift container base)
images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

# Mount the host home directory for easy file sharing
mounts:
  - location: "~"
    writable: true
  - location: "/tmp/lima"
    writable: true

# Enable SSH agent forwarding
ssh:
  forwardAgent: true

# Provision scripts - install Docker, USB tools, kernel modules, and udev rules
provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # ── Docker ──────────────────────────────────────────────────
      if ! command -v docker &> /dev/null; then
        curl -fsSL https://get.docker.com | sh
      fi

      # Ensure the Lima user is in the docker group (UID >= 500 for macOS-mirrored users)
      LIMA_USER=$(awk -F: '$3 >= 500 && $3 < 65534 && $6 ~ /^\/home\// { print $1; exit }' /etc/passwd)
      if [ -n "$LIMA_USER" ]; then
        usermod -aG docker "$LIMA_USER"
      fi

      # Make Docker socket accessible without requiring a VM restart for group
      # membership to take effect. This is a single-user VM so 666 is fine.
      mkdir -p /etc/systemd/system/docker.service.d
      cat > /etc/systemd/system/docker.service.d/socket-permissions.conf << 'DROPIN'
      [Service]
      ExecStartPost=/bin/chmod 666 /var/run/docker.sock
      DROPIN
      systemctl daemon-reload

      # ── USB & hardware libraries ───────────────────────────────
      apt-get update -qq
      apt-get install -y -qq \
        usbutils \
        libusb-1.0-0-dev \
        libhidapi-libusb0 \
        libhidapi-hidraw0 \
        libftdi1-dev \
        udev \
        bluez \
        bluetooth

      # ── Kernel modules for RF devices ──────────────────────────
      # Load common modules needed by SDR/RF hardware and Bluetooth
      for mod in usbcore usb_storage cdc_acm cp210x ftdi_sio ch341 pl2303 bluetooth btusb rfcomm vhci-hcd; do
        modprobe "$mod" 2>/dev/null || true
      done

      # Make module loading persistent
      cat > /etc/modules-load.d/rfswift.conf << 'MODULES'
      # RF Swift - USB serial and device modules
      cdc_acm
      cp210x
      ftdi_sio
      ch341
      pl2303
      # Bluetooth stack
      bluetooth
      btusb
      rfcomm
      vhci-hcd
      MODULES

      # Ensure /dev/vhci has proper permissions for container Bluetooth access
      if [ -e /dev/vhci ]; then
        chmod 0666 /dev/vhci
      fi

      # ── Udev rules for known RF devices ────────────────────────
      # These rules set appropriate permissions so containers can
      # access SDR/RF hardware without running as root.

      # -- Ettus Research USRP devices --
      cat > /etc/udev/rules.d/uhd-usrp.rules << 'UDEV'
      # USRP1
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="fffe", ATTRS{idProduct}=="0002", MODE:="0666"
      # B100
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="2500", ATTRS{idProduct}=="0002", MODE:="0666"
      # B200
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="2500", ATTRS{idProduct}=="0020", MODE:="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="2500", ATTRS{idProduct}=="0021", MODE:="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="2500", ATTRS{idProduct}=="0022", MODE:="0666"
      # B210/B205mini
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="3923", ATTRS{idProduct}=="7813", MODE:="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="3923", ATTRS{idProduct}=="7814", MODE:="0666"
      UDEV

      # -- Nuand BladeRF devices --
      cat > /etc/udev/rules.d/88-nuand-bladerf.rules << 'UDEV'
      # BladeRF v1
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="2cf0", ATTRS{idProduct}=="5246", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1d50", ATTRS{idProduct}=="6066", MODE="0666"
      # BladeRF 2.0 Micro
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="2cf0", ATTRS{idProduct}=="5250", MODE="0666"
      # Cypress FX3 bootloader (BladeRF recovery)
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="04b4", ATTRS{idProduct}=="00f3", MODE="0666"
      UDEV

      # -- HackRF --
      cat > /etc/udev/rules.d/53-hackrf.rules << 'UDEV'
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1d50", ATTRS{idProduct}=="604b", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1d50", ATTRS{idProduct}=="6089", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1fc9", ATTRS{idProduct}=="000c", MODE="0666"
      UDEV

      # -- RTL-SDR --
      cat > /etc/udev/rules.d/rtl-sdr.rules << 'UDEV'
      # RTL2832U
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0bda", ATTRS{idProduct}=="2832", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0bda", ATTRS{idProduct}=="2838", MODE="0666"
      # RTL-SDR Blog V4
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0bda", ATTRS{idProduct}=="2850", MODE="0666"
      UDEV

      # -- Airspy --
      cat > /etc/udev/rules.d/52-airspy.rules << 'UDEV'
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1d50", ATTRS{idProduct}=="60a1", MODE="0666"
      # Airspy HF+
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="03eb", ATTRS{idProduct}=="800c", MODE="0666"
      UDEV

      # -- LimeSDR --
      cat > /etc/udev/rules.d/64-limesuite.rules << 'UDEV'
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0403", ATTRS{idProduct}=="601f", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1d50", ATTRS{idProduct}=="6108", MODE="0666"
      UDEV

      # -- ADALM-Pluto (PlutoSDR) --
      cat > /etc/udev/rules.d/53-plutosdr.rules << 'UDEV'
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0456", ATTRS{idProduct}=="b673", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="2fa2", ATTRS{idProduct}=="5a02", MODE="0666"
      UDEV

      # -- FUNcube Dongle --
      cat > /etc/udev/rules.d/53-funcube.rules << 'UDEV'
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="04d8", ATTRS{idProduct}=="fb31", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="04d8", ATTRS{idProduct}=="fb56", MODE="0666"
      UDEV

      # -- Vector Network Analyzers (NanoVNA, etc.) --
      cat > /etc/udev/rules.d/51-vna.rules << 'UDEV'
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0483", ATTRS{idProduct}=="564e", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0483", ATTRS{idProduct}=="4121", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1209", ATTRS{idProduct}=="4121", MODE="0666"
      UDEV

      # -- Leobodnar GPSDO / calibration --
      cat > /etc/udev/rules.d/99-lbe.rules << 'UDEV'
      KERNEL=="hidraw*", SUBSYSTEM=="hidraw", MODE="0660", GROUP="plugdev"
      UDEV

      # -- RFNM --
      cat > /etc/udev/rules.d/rfnm.rules << 'UDEV'
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="15a2", ATTRS{idProduct}=="8c", MODE="0666"
      UDEV

      # -- JTAG/debug probes (OpenOCD, etc.) --
      cat > /etc/udev/rules.d/99-jtag.rules << 'UDEV'
      # FTDI-based probes
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0403", MODE="0666"
      # ST-Link
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0483", ATTRS{idProduct}=="3748", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0483", ATTRS{idProduct}=="374b", MODE="0666"
      # Segger J-Link
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1366", MODE="0666"
      # Bus Pirate
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0403", ATTRS{idProduct}=="6001", MODE="0666"
      UDEV

      # -- Logic Analyzers (Saleae, DSLogic, Sigrok) --
      cat > /etc/udev/rules.d/99-logic.rules << 'UDEV'
      # Saleae Logic
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0925", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="21a9", MODE="0666"
      # DSLogic / DreamSourceLab
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="2a0e", MODE="0666"
      # fx2lafw (Sigrok)
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1d50", ATTRS{idProduct}=="608c", MODE="0666"
      UDEV

      # -- Bluetooth adapters --
      cat > /etc/udev/rules.d/99-bluetooth.rules << 'UDEV'
      # CSR Bluetooth adapters (CSR 8510, etc.)
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0a12", MODE="0666"
      # Broadcom Bluetooth
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0a5c", MODE="0666"
      # Intel Bluetooth
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="8087", MODE="0666"
      # Realtek Bluetooth
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0bda", ATTRS{bInterfaceClass}=="e0", MODE="0666"
      # Qualcomm/Atheros Bluetooth
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0cf3", MODE="0666"
      # Sena UD100 / Parani
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0403", ATTRS{idProduct}=="fc82", MODE="0666"
      # Ubertooth One (Bluetooth sniffer)
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1d50", ATTRS{idProduct}=="6002", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1d50", ATTRS{idProduct}=="6003", MODE="0666"
      # nRF Sniffer (Nordic Semiconductor)
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1915", MODE="0666"
      # TI CC2540 / CC2531 (BLE sniffer)
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0451", ATTRS{idProduct}=="16b3", MODE="0666"
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="0451", ATTRS{idProduct}=="16a8", MODE="0666"
      UDEV

      # -- Proxmark3 --
      cat > /etc/udev/rules.d/99-proxmark3.rules << 'UDEV'
      # Proxmark3 RDV4
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="9ac4", MODE="0666"
      # Proxmark3 generic
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="2d2d", MODE="0666"
      UDEV

      # -- NFC readers --
      cat > /etc/udev/rules.d/99-nfc.rules << 'UDEV'
      # ACS ACR122U
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="072f", MODE="0666"
      # SCM Microsystems
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="04e6", MODE="0666"
      UDEV

      # -- Development boards & serial adapters --
      cat > /etc/udev/rules.d/99-devboards.rules << 'UDEV'
      # Maple/STM32 (ChameleonMini, etc.)
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1eaf", MODE="0666"
      # Teensy/VUSB
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="16c0", MODE="0666"
      # Silicon Labs CP210x
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="10c4", MODE="0666"
      # QinHeng CH340/CH341
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="1a86", MODE="0666"
      # Espressif ESP32
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="303a", MODE="0666"
      # Adafruit (nRF52, RP2040)
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="239a", MODE="0666"
      # Arduino
      SUBSYSTEMS=="usb", ATTRS{idVendor}=="2341", MODE="0666"
      UDEV

      # Reload udev rules
      udevadm control --reload-rules
      udevadm trigger

      # Ensure /dev/bus/usb has proper permissions for hot-plugged devices
      if [ -d /dev/bus/usb ]; then
        chmod -R a+rw /dev/bus/usb || true
      fi

# Port forwarding for RF Swift services
portForwards:
  # Forward Docker socket to host for transparent engine access
  - guestSocket: "/run/docker.sock"
    hostSocket: "{{.Dir}}/sock/docker.sock"
  # noVNC desktop
  - guestPort: 6080
    hostPort: 6080
  # PulseAudio TCP
  - guestPort: 34567
    hostPort: 34567
